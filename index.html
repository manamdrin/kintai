<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>勤怠管理システム</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0f172a;color:#f1f5f9;font-family:sans-serif;min-height:100vh;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const GAS_URL="https://script.google.com/macros/s/AKfycbyCoelqYHRe4iLV9LJJ4aIVgwiCeA8p2LbLWH5lSTnFWQlLadbuudgAa9bmqEHpVebJ/exec";
const STAFF_LIST=[
  {id:"s01",name:"さとうかえで"},
  {id:"s02",name:"かたぎりみゆう"},
  {id:"s03",name:"すずきひとみ"},
  {id:"s04",name:"ひがあいら"},
  {id:"s05",name:"いちむらてるみ"},
  {id:"s06",name:"はしもとゆうへい"},
  {id:"s07",name:"ながたゆき"},
  {id:"s08",name:"aaa"},
  {id:"s09",name:"bbb"},
  {id:"s10",name:"ccc"},
];
const ADMIN_PASS="admin1234";
const STORE_LAT=35.6518114;
const STORE_LNG=139.6692699;
const RADIUS_KM=2;
const SKIP_LOC=false;

const C={bg:"#0f172a",sur:"#1e293b",bor:"#334155",acc:"#38bdf8",gr:"#4ade80",re:"#f87171",ye:"#fbbf24",tx:"#f1f5f9",mu:"#94a3b8"};

function todayStr(){
  const d=new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
function nowTime(){
  return new Date().toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"});
}
function calcMin(i,o){
  if(!i||!o)return null;
  const p=v=>{const x=v.replace("：",":").split(":");return parseInt(x[0])*60+parseInt(x[1]);};
  return Math.max(0,p(o)-p(i)-60);
}
function fmtMin(m){
  if(m==null)return"---";
  return Math.floor(m/60)+"時間"+String(m%60).padStart(2,"0")+"分";
}
function km(la1,ln1,la2,ln2){
  const R=6371,a=Math.PI/180;
  const dL=(la2-la1)*a,dN=(ln2-ln1)*a;
  const x=Math.sin(dL/2)**2+Math.cos(la1*a)*Math.cos(la2*a)*Math.sin(dN/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}
async function gPost(data){
  await fetch(GAS_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},body:JSON.stringify(data)});
}
async function gGet(){
  try{
    const r=await fetch(GAS_URL+"?t="+Date.now(),{cache:"no-cache"});
    return await r.json();
  }catch(e){return[];}
}

function App(){
  const[view,setView]=React.useState("staff");
  const[authed,setAuthed]=React.useState(false);
  return React.createElement("div",{style:{minHeight:"100vh",background:C.bg,color:C.tx,fontFamily:"sans-serif"}},
    React.createElement("header",{style:{background:C.sur,borderBottom:"1px solid "+C.bor,padding:"12px 16px"}},
      React.createElement("div",{style:{fontWeight:700,fontSize:18,color:C.acc,marginBottom:8}},"⏱ 勤怠管理システム"),
      React.createElement("div",{style:{display:"flex",gap:8}},
        React.createElement("button",{style:view==="staff"?{padding:"6px 14px",borderRadius:8,border:"1px solid "+C.acc,background:C.acc+"22",color:C.acc,cursor:"pointer",fontSize:14,fontWeight:700}:{padding:"6px 14px",borderRadius:8,border:"1px solid "+C.bor,background:"transparent",color:C.mu,cursor:"pointer",fontSize:14},onClick:()=>setView("staff")},"📱 スタッフ打刻"),
        React.createElement("button",{style:view==="admin"?{padding:"6px 14px",borderRadius:8,border:"1px solid "+C.acc,background:C.acc+"22",color:C.acc,cursor:"pointer",fontSize:14,fontWeight:700}:{padding:"6px 14px",borderRadius:8,border:"1px solid "+C.bor,background:"transparent",color:C.mu,cursor:"pointer",fontSize:14},onClick:()=>setView("admin")},"🗂 管理者画面")
      )
    ),
    React.createElement("main",{style:{maxWidth:900,margin:"0 auto",padding:"24px 16px"}},
      view==="staff"?React.createElement(StaffView,null):React.createElement(AdminView,{authed,setAuthed})
    )
  );
}

function StaffView(){
  const[id,setId]=React.useState("");
  const[locMsg,setLocMsg]=React.useState("");
  const[locOk,setLocOk]=React.useState(null);
  const[msg,setMsg]=React.useState("");
  const[comment,setComment]=React.useState("");
  const[showC,setShowC]=React.useState(false);
  const[rec,setRec]=React.useState(null);
  const[loading,setLoading]=React.useState(false);
  const today=todayStr();

  React.useEffect(()=>{
    setLocMsg("");setMsg("");setLocOk(null);setComment("");setShowC(false);setRec(null);
    if(!id)return;
    setLoading(true);
    gGet().then(rows=>{
      const f=rows.find(r=>String(r.staffId).trim()===id&&String(r.date).trim()===today);
      setRec(f||null);
      setComment(f?f.comment||"":"");
    }).finally(()=>setLoading(false));
  },[id]);

  function checkLoc(onOk){
    if(SKIP_LOC){setLocMsg("✅ 打刻OK");setLocOk(true);onOk();return;}
    setLocMsg("📍 位置情報確認中...");
    if(!navigator.geolocation){setLocMsg("❌ 位置情報未対応");return;}
    navigator.geolocation.getCurrentPosition(pos=>{
      const d=km(pos.coords.latitude,pos.coords.longitude,STORE_LAT,STORE_LNG);
      if(d<=RADIUS_KM){setLocMsg("✅ 店舗から"+d.toFixed(2)+"km");setLocOk(true);onOk();}
      else{setLocMsg("❌ 店舗から"+d.toFixed(2)+"km（"+RADIUS_KM+"km以内必要）");setLocOk(false);}
    },()=>{setLocMsg("❌ 位置情報取得失敗");setLocOk(false);},{timeout:10000});
  }

  async function doIn(){
    checkLoc(async()=>{
      setLoading(true);
      const s=STAFF_LIST.find(x=>x.id===id);
      const t=nowTime();
      await gPost({staffId:id,staffName:s.name,date:today,inTime:t,outTime:"",comment:""});
      setRec({staffId:id,date:today,inTime:t,outTime:"",comment:""});
      setMsg("✅ 出勤打刻完了！");
      setLoading(false);
    });
  }

  async function doOut(){
    checkLoc(async()=>{
      setLoading(true);
      const s=STAFF_LIST.find(x=>x.id===id);
      const t=nowTime();
      await gPost({staffId:id,staffName:s.name,date:today,inTime:rec?rec.inTime:"",outTime:t,comment:comment||""});
      setRec(Object.assign({},rec,{outTime:t,comment:comment||""}));
      setMsg("✅ 退勤打刻完了！");setShowC(false);
      setLoading(false);
    });
  }

  async function saveComment(){
    setLoading(true);
    const s=STAFF_LIST.find(x=>x.id===id);
    await gPost({staffId:id,staffName:s.name,date:today,inTime:rec?rec.inTime:"",outTime:rec?rec.outTime:"",comment});
    setMsg("💬 コメント保存しました");setLoading(false);
  }

  const canIn=!rec||!rec.inTime;
  const canOut=rec&&rec.inTime&&!rec.outTime;
  const done=rec&&rec.inTime&&rec.outTime;
  const wmin=rec?calcMin(rec.inTime,rec.outTime):null;
  const cardStyle={background:C.sur,borderRadius:16,padding:24,border:"1px solid "+C.bor};

  return React.createElement("div",{style:cardStyle},
    React.createElement("h2",{style:{fontSize:20,fontWeight:700,marginBottom:8}},"📱 スタッフ打刻"),
    React.createElement("p",{style:{color:C.mu,fontSize:14,marginBottom:8}},new Date().toLocaleDateString("ja-JP",{year:"numeric",month:"long",day:"numeric",weekday:"long"})),
    React.createElement("label",{style:{display:"block",fontSize:13,color:C.mu,marginBottom:4,marginTop:12}},"スタッフ選択"),
    React.createElement("select",{style:{width:"100%",padding:"10px 12px",borderRadius:8,border:"1px solid "+C.bor,background:C.bg,color:C.tx,fontSize:15},value:id,onChange:e=>{setId(e.target.value);setMsg("");}},
      React.createElement("option",{value:""},"-- 選択してください --"),
      STAFF_LIST.map(s=>React.createElement("option",{key:s.id,value:s.id},s.name))
    ),
    id&&React.createElement("div",null,
      loading&&React.createElement("div",{style:{marginTop:12,padding:"10px 14px",borderRadius:8,background:C.ye+"22",color:C.ye,fontSize:14}},"⏳ 読み込み中..."),
      React.createElement("div",{style:{background:C.bg,borderRadius:10,padding:16,marginTop:16,border:"1px solid "+C.bor}},
        React.createElement("div",{style:{display:"flex",justifyContent:"space-between",padding:"6px 0"}},
          React.createElement("span",{style:{color:C.mu}},"出勤"),
          React.createElement("span",{style:{color:rec&&rec.inTime?C.gr:C.mu,fontWeight:700}},rec&&rec.inTime?rec.inTime:"未打刻")
        ),
        React.createElement("div",{style:{display:"flex",justifyContent:"space-between",padding:"6px 0"}},
          React.createElement("span",{style:{color:C.mu}},"退勤"),
          React.createElement("span",{style:{color:rec&&rec.outTime?C.gr:C.mu,fontWeight:700}},rec&&rec.outTime?rec.outTime:"未打刻")
        ),
        wmin!=null&&React.createElement("div",{style:{display:"flex",justifyContent:"space-between",padding:"6px 0"}},
          React.createElement("span",{style:{color:C.mu}},"実働"),
          React.createElement("span",{style:{color:C.gr,fontWeight:700}},fmtMin(wmin)+"（休憩1h除く）")
        )
      ),
      locMsg&&React.createElement("div",{style:{marginTop:12,padding:"10px 14px",borderRadius:8,background:(locOk===false?C.re:locOk?C.gr:C.ye)+"22",color:(locOk===false?C.re:locOk?C.gr:C.ye),fontSize:14}},locMsg),
      msg&&React.createElement("div",{style:{marginTop:12,padding:"10px 14px",borderRadius:8,background:C.gr+"22",color:C.gr,fontSize:14}},msg),
      React.createElement("div",{style:{display:"flex",gap:12,marginTop:16,flexWrap:"wrap"}},
        canIn&&React.createElement("button",{style:{flex:1,padding:"14px 24px",borderRadius:10,border:"none",background:C.gr,color:"#0f172a",fontWeight:700,fontSize:16,cursor:"pointer",minWidth:120},onClick:doIn,disabled:loading},"🟢 出勤"),
        canOut&&React.createElement("button",{style:{flex:1,padding:"14px 24px",borderRadius:10,border:"none",background:C.re,color:"#fff",fontWeight:700,fontSize:16,cursor:"pointer",minWidth:120},onClick:()=>setShowC(true),disabled:loading},"🔴 退勤"),
        done&&React.createElement("span",{style:{display:"inline-flex",alignItems:"center",padding:"6px 16px",borderRadius:20,background:C.gr+"22",color:C.gr,fontSize:14}},"本日の打刻完了 ✓")
      ),
      showC&&React.createElement("div",{style:{marginTop:16,padding:16,borderRadius:10,border:"1px solid "+C.acc+"44",background:C.acc+"11"}},
        React.createElement("p",{style:{color:C.acc,fontSize:14,marginBottom:8}},"💬 コメント（任意）"),
        React.createElement("textarea",{style:{width:"100%",padding:"10px 12px",borderRadius:8,border:"1px solid "+C.bor,background:C.bg,color:C.tx,fontSize:14,resize:"vertical",marginTop:4},rows:3,value:comment,onChange:e=>setComment(e.target.value),placeholder:"例：体調不良で15時に早退"}),
        React.createElement("div",{style:{display:"flex",gap:12,marginTop:16}},
          React.createElement("button",{style:{flex:1,padding:"14px 24px",borderRadius:10,border:"none",background:C.re,color:"#fff",fontWeight:700,fontSize:16,cursor:"pointer"},onClick:doOut,disabled:loading},"退勤を確定する"),
          React.createElement("button",{style:{padding:"8px 16px",borderRadius:8,border:"1px solid "+C.bor,background:"transparent",color:C.mu,cursor:"pointer",fontSize:14},onClick:()=>setShowC(false)},"キャンセル")
        )
      ),
      rec&&!showC&&React.createElement("div",{style:{marginTop:16}},
        React.createElement("label",{style:{display:"block",fontSize:13,color:C.mu,marginBottom:4,marginTop:12}},"💬 本日のコメント（後から編集可）"),
        React.createElement("textarea",{style:{width:"100%",padding:"10px 12px",borderRadius:8,border:"1px solid "+C.bor,background:C.bg,color:C.tx,fontSize:14,resize:"vertical",marginTop:4},rows:2,value:comment,onChange:e=>setComment(e.target.value),placeholder:"早退・休憩短縮など"}),
        React.createElement("button",{style:{marginTop:8,padding:"10px 20px",borderRadius:8,border:"none",background:C.acc,color:"#0f172a",fontWeight:700,fontSize:14,cursor:"pointer"},onClick:saveComment,disabled:loading},"コメントを保存")
      )
    )
  );
}

function AdminView({authed,setAuthed}){
  const[pass,setPass]=React.useState("");
  const[err,setErr]=React.useState("");
  const[month,setMonth]=React.useState(todayStr().slice(0,7));
  const[fs,setFs]=React.useState("all");
  const[allData,setAllData]=React.useState([]);
  const[loading,setLoading]=React.useState(false);
  const cardStyle={background:C.sur,borderRadius:16,padding:24,border:"1px solid "+C.bor};

  function login(){pass===ADMIN_PASS?(setAuthed(true),setErr("")):setErr("パスワードが違います");}

  React.useEffect(()=>{
    if(!authed)return;
    setLoading(true);
    gGet().then(r=>setAllData(r)).finally(()=>setLoading(false));
  },[authed]);

  if(!authed)return React.createElement("div",{style:cardStyle},
    React.createElement("h2",{style:{fontSize:20,fontWeight:700,marginBottom:8}},"🔐 管理者ログイン"),
    React.createElement("label",{style:{display:"block",fontSize:13,color:C.mu,marginBottom:4,marginTop:12}},"パスワード"),
    React.createElement("input",{type:"password",style:{width:"100%",padding:"10px 12px",borderRadius:8,border:"1px solid "+C.bor,background:C.bg,color:C.tx,fontSize:15},value:pass,onChange:e=>setPass(e.target.value),onKeyDown:e=>e.key==="Enter"&&login(),placeholder:"管理者パスワード"}),
    err&&React.createElement("div",{style:{marginTop:12,padding:"10px 14px",borderRadius:8,background:C.re+"22",color:C.re,fontSize:14}},err),
    React.createElement("button",{style:{marginTop:8,padding:"10px 20px",borderRadius:8,border:"none",background:C.acc,color:"#0f172a",fontWeight:700,fontSize:14,cursor:"pointer"},onClick:login},"ログイン")
  );

  const[y,m]=month.split("-").map(Number);
  const dim=new Date(y,m,0).getDate();
  const days=Array.from({length:dim},(_,i)=>month+"-"+String(i+1).padStart(2,"0"));
  const staff=fs==="all"?STAFF_LIST:STAFF_LIST.filter(s=>s.id===fs);
  function getRec(sid,date){return allData.find(r=>String(r.staffId).trim()===sid&&String(r.date).trim()===date)||null;}

  function exportCSV(){
    const rows=[["スタッフ名","日付","曜日","出勤","退勤","実働時間(分)","実働時間","コメント"]];
    const wd=["日","月","火","水","木","金","土"];
    staff.forEach(s=>{
      days.forEach(date=>{
        const r=getRec(s.id,date);
        if(!r||!r.inTime)return;
        const wm=calcMin(r.inTime,r.outTime);
        rows.push([s.name,date,wd[new Date(date).getDay()],r.inTime||"",r.outTime||"",wm!=null?wm:"",fmtMin(wm),r.comment||""]);
      });
    });
    const csv="\uFEFF"+rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(",")).join("\n");
    const a=document.createElement("a");
    a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
    a.download="勤怠_"+month+".csv";a.click();
  }

  return React.createElement("div",{style:cardStyle},
    React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}},
      React.createElement("h2",{style:{fontSize:20,fontWeight:700}},"🗂 管理者画面"),
      React.createElement("div",{style:{display:"flex",gap:8}},
        React.createElement("button",{style:{padding:"8px 16px",borderRadius:8,border:"1px solid "+C.bor,background:"transparent",color:C.mu,cursor:"pointer",fontSize:14},onClick:()=>{setLoading(true);gGet().then(r=>setAllData(r)).finally(()=>setLoading(false));}},"🔄 更新"),
        React.createElement("button",{style:{padding:"8px 16px",borderRadius:8,border:"1px solid "+C.bor,background:"transparent",color:C.mu,cursor:"pointer",fontSize:14},onClick:()=>setAuthed(false)},"ログアウト")
      )
    ),
    loading&&React.createElement("div",{style:{marginTop:12,padding:"10px 14px",borderRadius:8,background:C.ye+"22",color:C.ye,fontSize:14}},"⏳ 読み込み中..."),
    React.createElement("div",{style:{display:"flex",gap:16,flexWrap:"wrap",alignItems:"flex-end",marginBottom:20}},
      React.createElement("div",null,
        React.createElement("label",{style:{display:"block",fontSize:13,color:C.mu,marginBottom:4,marginTop:12}},"表示月"),
        React.createElement("input",{type:"month",style:{width:"100%",padding:"10px 12px",borderRadius:8,border:"1px solid "+C.bor,background:C.bg,color:C.tx,fontSize:15},value:month,onChange:e=>setMonth(e.target.value)})
      ),
      React.createElement("div",null,
        React.createElement("label",{style:{display:"block",fontSize:13,color:C.mu,marginBottom:4,marginTop:12}},"スタッフ"),
        React.createElement("select",{style:{width:"100%",padding:"10px 12px",borderRadius:8,border:"1px solid "+C.bor,background:C.bg,color:C.tx,fontSize:15},value:fs,onChange:e=>setFs(e.target.value)},
          React.createElement("option",{value:"all"},"全員"),
          STAFF_LIST.map(s=>React.createElement("option",{key:s.id,value:s.id},s.name))
        )
      ),
      React.createElement("div",{style:{alignSelf:"flex-end"}},
        React.createElement("button",{style:{padding:"10px 20px",borderRadius:8,border:"none",background:C.ye,color:"#0f172a",fontWeight:700,fontSize:14,cursor:"pointer"},onClick:exportCSV},"📊 CSVエクスポート")
      )
    ),
    React.createElement("h3",{style:{fontSize:16,fontWeight:700,color:C.acc,marginTop:24,marginBottom:8,borderBottom:"1px solid "+C.bor,paddingBottom:6}},"月次サマリー（"+month+"）"),
    React.createElement("div",{style:{overflowX:"auto"}},
      React.createElement("table",{style:{width:"100%",borderCollapse:"collapse",fontSize:13,minWidth:500}},
        React.createElement("thead",null,React.createElement("tr",null,
          ["スタッフ名","出勤日数","合計実働"].map(h=>React.createElement("th",{key:h,style:{padding:"8px 12px",background:C.bg,color:C.mu,textAlign:"left",borderBottom:"1px solid "+C.bor}},h))
        )),
        React.createElement("tbody",null,staff.map(s=>{
          let td=0,tw=0;
          days.forEach(d=>{const r=getRec(s.id,d);if(r&&r.inTime){td++;const mn=calcMin(r.inTime,r.outTime);if(mn)tw+=mn;}});
          return React.createElement("tr",{key:s.id,style:{borderBottom:"1px solid "+C.bor+"22"}},
            React.createElement("td",{style:{padding:"7px 12px"}},s.name),
            React.createElement("td",{style:{padding:"7px 12px",textAlign:"center"}},td+"日"),
            React.createElement("td",{style:{padding:"7px 12px",textAlign:"center"}},fmtMin(tw))
          );
        }))
      )
    ),
    React.createElement("h3",{style:{fontSize:16,fontWeight:700,color:C.acc,marginTop:24,marginBottom:8,borderBottom:"1px solid "+C.bor,paddingBottom:6}},"日別詳細"),
    staff.map(s=>React.createElement("div",{key:s.id,style:{marginBottom:24}},
      React.createElement("h4",{style:{color:C.acc,marginBottom:6}},s.name),
      React.createElement("div",{style:{overflowX:"auto"}},
        React.createElement("table",{style:{width:"100%",borderCollapse:"collapse",fontSize:13,minWidth:500}},
          React.createElement("thead",null,React.createElement("tr",null,
            ["日付","出勤","退勤","実働","コメント"].map(h=>React.createElement("th",{key:h,style:{padding:"8px 12px",background:C.bg,color:C.mu,textAlign:"left",borderBottom:"1px solid "+C.bor}},h))
          )),
          React.createElement("tbody",null,days.map(date=>{
            const r=getRec(s.id,date);
            if(!r||!r.inTime)return null;
            const wm=calcMin(r.inTime,r.outTime);
            const wd=["日","月","火","水","木","金","土"][new Date(date).getDay()];
            const isWe=[0,6].includes(new Date(date).getDay());
            return React.createElement("tr",{key:date,style:{borderBottom:"1px solid "+C.bor+"22",background:isWe?"#1a2035":"transparent"}},
              React.createElement("td",{style:{padding:"7px 12px"}},date.slice(5)+"("+wd+")"),
              React.createElement("td",{style:{padding:"7px 12px"}},r.inTime||"---"),
              React.createElement("td",{style:{padding:"7px 12px"}},r.outTime||"---"),
              React.createElement("td",{style:{padding:"7px 12px",textAlign:"center"}},wm!=null?fmtMin(wm):"---"),
              React.createElement("td",{style:{padding:"7px 12px",maxWidth:200,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},r.comment||"")
            );
          }))
        )
      )
    ))
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App,null));
</script>
</body>
</html>
